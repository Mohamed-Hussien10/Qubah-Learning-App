name: web_dashboard
description: "Qubah Learning App - Admin Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ─────────────────────────────────────────────────────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # ── Networking ───────────────────────────────────────────────────────────
  dio: ^5.8.0+1

  # ── Dependency Injection ─────────────────────────────────────────────────
  get_it: ^8.0.3

  # ── Routing ──────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Storage ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.5.3

  # ── JSON Serialization ──────────────────────────────────────────────────
  json_annotation: ^4.9.0

  # ── Charts ──────────────────────────────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Tables ──────────────────────────────────────────────────────────────
  data_table_2: ^2.5.16

  # ── UI Enhancements ────────────────────────────────────────────────────
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # ── Utilities ───────────────────────────────────────────────────────────
  file_picker: ^8.3.7
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
